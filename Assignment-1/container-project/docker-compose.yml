services:

  backend:
    build: ./backend
    container_name: backend_container
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    depends_on:
      - postgres

  postgres:
    build: ./database
    container_name: postgres_container
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: